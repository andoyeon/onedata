<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOSIS 데이터 대시보드</title>
  <meta name="description" content="KOSIS 국가통계포털의 최신 주요 지표를 시각화한 대시보드" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 rx=%226%22 fill=%22%232a78d6%22/><text x=%2216%22 y=%2222%22 font-size=%2216%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22>K</text></svg>" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-row">
      <div>
        <p class="eyebrow">KOSIS 국가통계포털</p>
        <h1>대한민국 통계 대시보드</h1>
        <p class="subtitle">최근 발표된 인구·고용·물가 지표를 한눈에 확인하세요.</p>
      </div>
      <div class="header-actions">
        <span class="updated-at" id="updated-at">데이터 갱신일 확인 중…</span>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="다크 모드 전환">
          <span aria-hidden="true">◐</span>
        </button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section aria-labelledby="stat-heading" class="section">
      <h2 id="stat-heading">최근 발표 지표</h2>
      <p class="section-desc">가장 최근 시점 값과 직전 시점 대비 증감입니다.</p>
      <div id="stat-grid" class="stat-grid" role="list"></div>
    </section>

    <section aria-labelledby="charts-heading" class="section">
      <div class="section-head-row">
        <div>
          <h2 id="charts-heading">지표별 추이</h2>
          <p class="section-desc">그래프에 마우스를 올리면 시점별 값을 확인할 수 있습니다.</p>
        </div>
        <div class="filter-row" id="category-filter" role="group" aria-label="카테고리 필터"></div>
      </div>
      <div id="chart-grid" class="chart-grid"></div>
    </section>

    <section aria-labelledby="releases-heading" class="section">
      <h2 id="releases-heading">최근 발표된 월간 지표</h2>
      <p class="section-desc">KOSIS 월간 수록 지표 중 최근 갱신된 항목입니다.</p>
      <div class="table-toolbar">
        <input type="search" id="release-search" placeholder="지표명 검색…" aria-label="지표명 검색" />
      </div>
      <div class="table-scroll">
        <table class="releases-table" id="releases-table">
          <thead>
            <tr>
              <th scope="col">지표명</th>
              <th scope="col">지역</th>
              <th scope="col">단위</th>
              <th scope="col">최근 시점</th>
            </tr>
          </thead>
          <tbody id="releases-tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>출처: KOSIS 국가통계포털(통계청). 본 페이지는 학습·개인용 목적의 비공식 시각화이며, 공식 수치는 <a href="https://kosis.kr" target="_blank" rel="noopener">kosis.kr</a>에서 확인하세요.</p>
    </div>
  </footer>

  <div id="tooltip" class="chart-tooltip" role="tooltip" hidden></div>

  <script src="assets/app.js"></script>
</body>
</html>

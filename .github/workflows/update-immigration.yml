name: Update immigration data

on:
  schedule:
    - cron: "0 21 * * *" # 매일 06:00 KST
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-immigration
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh KOSIS-sourced immigration snapshot
        run: python scripts/fetch_immigration.py

      - name: Fetch data.go.kr nationality/naturalization data
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: python scripts/fetch_immigration_datagokr.py

      - name: Fetch 외국인 관련 news (Google News RSS)
        run: python scripts/fetch_news.py immigration

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: update immigration data [skip ci]"
            git push
          fi

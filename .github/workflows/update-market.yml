name: Update market data

on:
  schedule:
    - cron: "0 21 * * *" # 매일 06:00 KST
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-market
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch DART disclosures
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python scripts/fetch_dart.py

      - name: Fetch ECOS financial indicators
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: python scripts/fetch_ecos.py

      - name: Fetch 지표누리 supplementary indicators
        env:
          INDEX_API_KEY: ${{ secrets.INDEX_API_KEY }}
        run: python scripts/fetch_index.py

      - name: Refresh KOSIS 금융 지표 snapshot
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
        run: python scripts/fetch_kosis_financial.py

      - name: Fetch financial news (Google News RSS)
        run: python scripts/fetch_news.py market

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: update market data [skip ci]"
            git push
          fi
